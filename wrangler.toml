name = "stock-tracker"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "STOCK_DATA"
id = "f7845bb8f6c048f0b658ac01797ced0b"
preview_id = "f7845bb8f6c048f0b658ac01797ced0b"

[[d1_databases]]
binding = "DB"
database_name = "stock-tracker-db"
database_id = "8451af7d-ba5b-47b3-915f-8aee5fa82723"
migrations_dir = "migrations"

[observability]
enabled = true

[triggers]
crons = [
  "0 0 * * *",          # 北京时间上午 8:00 基金增量备份 (UTC 0:0)
  "0 18-20 * * *",      # 北京时间凌晨 2:00, 3:00, 4:00 基础数据与历史更新 (UTC 18, 19, 20)
  "* 1-3,5-7 * * 1-5"   # 北京时间 9:30-11:30, 13:00-15:00 盘中轮询 & 15:30 清理 (UTC 1-3, 5-7)
]

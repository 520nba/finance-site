name = "stock-tracker"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "STOCK_DATA"
id = "f7845bb8f6c048f0b658ac01797ced0b"
preview_id = "f7845bb8f6c048f0b658ac01797ced0b"

[[d1_databases]]
binding = "DB"
database_name = "stock-tracker-db"
database_id = "8451af7d-ba5b-47b3-915f-8aee5fa82723"
migrations_dir = "migrations"

[observability]
enabled = true

[triggers]
crons = [
  "0 0 * * *",          # 北京时间 08:00 基金备份 (UTC 0)
  "0 13 * * 1-5",       # 北京时间 21:00 历史更新 (UTC 13)
  "30-59/5 1 * * 1-5",  # 北京时间 09:30-09:59 盘中 (UTC 1)
  "*/5 2-3 * * 1-5",    # 北京时间 10:00-11:59 盘中 (UTC 2-3)
  "*/5 5-7 * * 1-5"     # 北京时间 13:00-15:59 盘中 (UTC 5-7)
]
